services:
  db:
    image: mysql:8.0
    container_name: kaizen_db
    restart: always
    environment:
      MYSQL_DATABASE: kaizen_db
      MYSQL_USER: kaizen_user
      MYSQL_PASSWORD: kaizen_pass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    mem_limit: 512m
    command: >
      --innodb-buffer-pool-size=128M
      --max-connections=50
      --performance-schema=OFF
      --skip-log-bin

  backend:
    build: ./backend
    container_name: kaizen_backend
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    mem_limit: 256m

  frontend:
    build: ./frontend
    container_name: kaizen_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    mem_limit: 64m

volumes:
  mysql_data: